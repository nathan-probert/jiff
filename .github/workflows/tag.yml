name: tag-on-version-change

on:
  push:
    branches:
      - main
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          VERSION=$(cat VERSION)

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git tag v$VERSION
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/nathan-probert/jiff.git v$VERSION